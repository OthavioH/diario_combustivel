<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Fuel Diary - New Vehicle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed-dim": "#abc8f4",
                      "on-secondary": "#ffffff",
                      "outline": "#73777f",
                      "on-tertiary-fixed-variant": "#5e4100",
                      "secondary-fixed-dim": "#95d4b3",
                      "secondary-fixed": "#b1f0ce",
                      "inverse-on-surface": "#f0f1f2",
                      "primary": "#002547",
                      "surface-container-highest": "#e1e3e4",
                      "inverse-surface": "#2e3132",
                      "tertiary-fixed": "#ffdea9",
                      "on-tertiary-fixed": "#271900",
                      "primary-container": "#1b3b5f",
                      "surface-bright": "#f8f9fa",
                      "on-secondary-container": "#316e52",
                      "on-background": "#191c1d",
                      "secondary-container": "#aeeecb",
                      "on-error": "#ffffff",
                      "surface-variant": "#e1e3e4",
                      "on-primary-fixed": "#001c38",
                      "on-surface": "#191c1d",
                      "surface-container-high": "#e7e8e9",
                      "outline-variant": "#c3c6cf",
                      "surface-container": "#edeeef",
                      "surface": "#f8f9fa",
                      "on-tertiary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-error-container": "#93000a",
                      "background": "#f8f9fa",
                      "surface-container-low": "#f3f4f5",
                      "primary-fixed": "#d3e4ff",
                      "on-primary-fixed-variant": "#2a486d",
                      "on-secondary-fixed": "#002114",
                      "tertiary-fixed-dim": "#ffba27",
                      "error": "#ba1a1a",
                      "secondary": "#2c694e",
                      "surface-tint": "#426086",
                      "on-primary": "#ffffff",
                      "on-secondary-fixed-variant": "#0e5138",
                      "inverse-primary": "#abc8f4",
                      "tertiary-container": "#4e3500",
                      "surface-dim": "#d9dadb",
                      "tertiary": "#322100",
                      "on-tertiary-container": "#d59800",
                      "on-surface-variant": "#43474e",
                      "error-container": "#ffdad6",
                      "on-primary-container": "#88a6cf"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "stack-md": "16px",
                      "stack-lg": "24px",
                      "touch-target": "48px",
                      "stack-sm": "8px",
                      "container-padding": "16px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "unit-mono": [
                              "JetBrains Mono"
                      ],
                      "label-caps": [
                              "Inter"
                      ],
                      "body-md": [
                              "Inter"
                      ],
                      "headline-lg": [
                              "Inter"
                      ],
                      "display-data": [
                              "Inter"
                      ],
                      "body-lg": [
                              "Inter"
                      ],
                      "headline-md": [
                              "Inter"
                      ]
              },
              "fontSize": {
                      "unit-mono": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "fontWeight": "500"
                              }
                      ],
                      "label-caps": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "600"
                              }
                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-lg": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "fontWeight": "600"
                              }
                      ],
                      "display-data": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ],
                      "body-lg": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-md": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ]
              }
            }
          }
        }
      </script>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md text-body-md antialiased pb-24">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background docked full-width top-0 border-b border-outline-variant dark:border-outline flat no shadows flex justify-between items-center w-full px-container-padding h-touch-target sticky z-40">
<button aria-label="Go back" class="text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors active:opacity-80 transition-opacity p-2 rounded-full flex items-center justify-center h-touch-target w-touch-target">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed-dim absolute left-1/2 transform -translate-x-1/2">New Vehicle</h1>
<div class="w-touch-target h-touch-target"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-md mx-auto px-container-padding pt-stack-lg">
<form class="space-y-stack-lg">
<!-- Vehicle Type Segmented Control -->
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block">Vehicle Photo</label>
<div class="relative group cursor-pointer">
<div class="w-full aspect-video bg-surface-container-low border-2 border-dashed border-outline-variant rounded-xl flex flex-col items-center justify-center gap-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" style="font-size: 48px;">add_a_photo</span>
<span class="font-body-md text-on-surface-variant">Add Vehicle Photo</span>
</div>
<input type="file" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" aria-label="Upload vehicle photo">
</div>
</div><div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block">Vehicle Type</label>
<div class="bg-surface-container-high rounded-full p-1 flex relative">
<div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-surface-container-lowest rounded-full shadow-sm transition-transform duration-200" id="typeIndicator"></div>
<label class="flex-1 text-center relative z-10 cursor-pointer">
<input checked="" class="sr-only peer" name="vehicleType" onchange="document.getElementById('typeIndicator').style.transform = 'translateX(0)'" type="radio" value="car">
<div class="h-10 flex items-center justify-center font-body-lg text-body-lg text-on-surface-variant peer-checked:text-primary transition-colors">
<span class="material-symbols-outlined mr-2" data-icon="directions_car">directions_car</span>
                            Car
                        </div>
</label>
<label class="flex-1 text-center relative z-10 cursor-pointer">
<input class="sr-only peer" name="vehicleType" onchange="document.getElementById('typeIndicator').style.transform = 'translateX(100%)'" type="radio" value="motorcycle">
<div class="h-10 flex items-center justify-center font-body-lg text-body-lg text-on-surface-variant peer-checked:text-primary transition-colors">
<span class="material-symbols-outlined mr-2" data-icon="two_wheeler">two_wheeler</span>
                            Motorcycle
                        </div>
</label>
</div>
</div>
<!-- Vehicle Name -->
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block" for="vehicleName">Vehicle Name</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="vehicleName" placeholder="e.g., Blue Sedan" type="text">
</div>
</div>
<!-- Initial Odometer -->
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block" for="odometer">Current Odometer</label>
<div class="relative flex border border-outline-variant rounded-DEFAULT bg-surface-container-lowest focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-colors overflow-hidden">
<input class="flex-1 h-14 px-4 bg-transparent border-none focus:ring-0 font-display-data text-display-data text-on-surface w-full" id="odometer" placeholder="0" type="number">
<div class="bg-surface-container-low px-4 flex items-center justify-center border-l border-outline-variant">
<span class="font-unit-mono text-unit-mono text-on-surface-variant">km</span>
</div>
</div>
</div>
<!-- Primary Fuel Type -->
<div class="space-y-stack-sm">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider block">Primary Fuel Type</label>
<div class="grid grid-cols-2 gap-gutter">
<label class="cursor-pointer relative">
<input checked="" class="sr-only peer" name="fuelType" type="radio" value="gasoline">
<div class="h-14 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT flex items-center justify-center font-body-lg text-body-lg text-on-surface peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-container transition-all">
                            Gasoline
                        </div>
</label>
<label class="cursor-pointer relative">
<input class="sr-only peer" name="fuelType" type="radio" value="ethanol">
<div class="h-14 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT flex items-center justify-center font-body-lg text-body-lg text-on-surface peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-container transition-all">
                            Ethanol
                        </div>
</label>
<label class="cursor-pointer relative">
<input class="sr-only peer" name="fuelType" type="radio" value="diesel">
<div class="h-14 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT flex items-center justify-center font-body-lg text-body-lg text-on-surface peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-container transition-all">
                            Diesel
                        </div>
</label>
<label class="cursor-pointer relative">
<input class="sr-only peer" name="fuelType" type="radio" value="electric">
<div class="h-14 bg-surface-container-lowest border border-outline-variant rounded-DEFAULT flex items-center justify-center font-body-lg text-body-lg text-on-surface peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-container transition-all">
                            Electric
                        </div>
</label>
</div>
</div>
<!-- Save Button Area (Fixed to bottom on mobile, inline on larger screens) -->
<div class="mt-stack-lg pt-stack-md pb-stack-md fixed bottom-0 left-0 w-full bg-background border-t border-outline-variant px-container-padding z-40 sm:relative sm:border-none sm:bg-transparent sm:px-0 sm:pb-0">
<button class="w-full h-14 bg-secondary text-on-secondary rounded-full font-headline-md text-headline-md font-bold flex items-center justify-center shadow-sm hover:opacity-90 active:scale-[0.98] transition-all" type="button">
<span class="material-symbols-outlined mr-2" data-icon="save">save</span>
                    Save Vehicle
                </button>
</div>
</form>
</main>


</body></html>
